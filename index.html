<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智慧報案系統</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background-color: #121212; color: white; text-align: center; }
        input, select, textarea { width: 90%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #444; background: #222; color: white; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        button { padding: 15px; font-size: 16px; border: none; border-radius: 8px; color: white; cursor: pointer; font-weight: bold; }
        
        /* 區塊樣式 */
        .section-title { margin-top: 30px; font-size: 1.2em; border-bottom: 1px solid #444; padding-bottom: 5px; }
        .sms-btn { background-color: #27ae60; }
        .call-btn { background-color: #c0392b; height: 60px; font-size: 18px; }
        .info-box { background: #333; padding: 15px; border-radius: 8px; margin-bottom: 15px; border: 1px solid #555; }
    </style>
</head>
<body>

    <h2>智慧報案系統</h2>
    
    <div class="info-box">
        <input type="text" id="locationInput" readonly placeholder="定位中...">
        <input type="text" id="coordInput" readonly placeholder="座標...">
    </div>

    <select id="accidentType">
        <option value="A1">車禍：A1類 (死亡)</option>
        <option value="A2">車禍：A2類 (受傷)</option>
        <option value="A3">車禍：A3類 (僅財損)</option>
    </select>
    <textarea id="note" rows="2" placeholder="現場說明..."></textarea>

    <div class="section-title">簡訊文字報案</div>
    <div class="grid">
        <button class="sms-btn" onclick="sendReport('accident')">【車禍】簡訊</button>
        <button class="sms-btn" onclick="sendReport('parking')">【違停】簡訊</button>
        <button class="sms-btn" onclick="sendReport('general')">【協助】簡訊</button>
        <button class="sms-btn" onclick="sendReport('criminal')">【刑事】簡訊</button>
    </div>

    <div class="section-title">緊急語音通話</div>
    <div class="grid">
        <button class="call-btn" onclick="window.location.href='tel:110'">撥打 110</button>
        <button class="call-btn" style="background-color: #d35400;" onclick="window.location.href='tel:119'">撥打 119</button>
    </div>

    <script>
        const API_KEY = 'AIzaSyDePx-sl1uvHjSyfZGVUEsrTrHF3XYuNkU';
        const smsNumbers = {
            "台北市": "0912625110", "新北市": "0911510110", "桃園市": "0911510110",
            "台中市": "0911510110", "台南市": "0911510110", "高雄市": "0911510110",
            "基隆市": "0911510110", "新竹市": "0911510110", "嘉義市": "0911510110"
        };

        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition((pos) => {
                const lat = pos.coords.latitude;
                const lng = pos.coords.longitude;
                document.getElementById('coordInput').value = `${lat.toFixed(6)}, ${lng.toFixed(6)}`;
                fetch(`https://maps.googleapis.com/maps/api/geocode/json?latlng=${lat},${lng}&key=${API_KEY}&language=zh-TW`)
                    .then(res => res.json())
                    .then(data => {
                        if (data.status === 'OK') document.getElementById('locationInput').value = data.results[0].formatted_address;
                    });
            });
        }

        function sendReport(type) {
            const loc = document.getElementById('locationInput').value;
            const note = document.getElementById('note').value;
            let targetPhone = "110"; 

            for (let city in smsNumbers) {
                if (loc.includes(city)) {
                    targetPhone = smsNumbers[city];
                    break;
                }
            }

            let msg = "";
            switch(type) {
                case 'accident': msg = `【車禍報案】類別：${document.getElementById('accidentType').value}。地點：${loc}。說明：${note}。`; break;
                case 'parking':  msg = `【違規停車】地點：${loc}。說明：${note}。請派員查處。`; break;
                case 'general':  msg = `【一般協助】地點：${loc}。說明：${note}。請協助。`; break;
                case 'criminal': msg = `【刑事報案】地點：${loc}。說明：${note}。請警方介入。`; break;
            }
            window.location.href = `sms:${targetPhone}?body=${encodeURIComponent(msg)}`;
        }
    </script>
</body>
</html>
